const mean = a => a.reduce((s,v)=>s+v,0)/a.length;
const std  = a => {const m=mean(a);return Math.sqrt(a.reduce((s,v)=>s+(v-m)**2,0)/(a.length-1));};
const cm_  = (a,mn,mx) => {const s=std(a);return s>0?(mx-mn)/(6*s):null;};
const cmk_ = (a,mn,mx) => {const m=mean(a),s=std(a);return s>0?Math.min(m-mn,mx-m)/(3*s):null;};

const logEl = document.getElementById('log');
function log(msg,type){
  logEl.classList.add('v');
  const d=document.createElement('div');d.className='l '+(type||'i');
  d.textContent='['+new Date().toLocaleTimeString('fr-FR')+']  '+msg;
  logEl.appendChild(d);logEl.scrollTop=logEl.scrollHeight;
}
function progress(p){document.getElementById('pw').classList.add('v');document.getElementById('pb').style.width=p+'%';}

  log('SEED LEONI v2 - Debut','w');
  const total=TOOLS.length+BONS.length+1;let done=0;
  const tick=()=>{done++;progress(Math.round(done/total*100));};

    log('Injection des '+TOOLS.length+' outils...','i');

      await rtdb.ref('tools/'+t.id).set({...t,createdAt:Date.now(),updatedAt:Date.now()});

    await rtdb.ref('counters/registre').set(BONS.length);tick();

    log('Injection des '+BONS.length+' bons...','i');

      const tool=TOOLS.find(t=>t.id===b.tid)||TOOLS[0];
      const tech=TECHS[b.ti];
      const lt=b.li===1?LABO2:LABO;
      const now=dAgo(b.da,b.h);
      const subAt=['submitted','validated','rejected'].includes(b.st)?now+3600000:null;
      const decAt=['validated','rejected'].includes(b.st)?now+10800000:null;

      if(subAt)hist.push({status:'submitted',at:subAt,by:tech.uid,byName:tech.name});
      if(decAt&&b.st==='validated')hist.push({status:'validated',at:decAt,by:lt.uid,byName:lt.name});
      if(decAt&&b.st==='rejected') hist.push({status:'rejected', at:decAt,by:lt.uid,byName:lt.name,reason:b.rej});
      let labData=null;
      if(b.st==='validated'&&b.hi){
        const HI=b.hi,EF=b.ef;
        labData={filledAt:decAt,filledBy:{uid:lt.uid,name:lt.name,matricule:lt.matricule},decision:'validated',
          connexion:{refConnexion:b.ref,sectionCable:b.sec,indiceParametrique:b.ind},
          mesures:{largeurAme:1.45,hauteurIsolant:HI,effort:EF},
          capabilite:{hauteurAmeMoyenne:mean(HI),cmAme:cm_(HI,1.40,1.70),cmkAme:cmk_(HI,1.40,1.70),cmEffort:cm_(EF,40,70),chuteTension:b.cht},
          conformites:{chanfrein:true,temoinCoupe:true,flexion:true},signatureUrl:null};
      }
      if(b.st==='rejected'){
        labData={filledAt:decAt,filledBy:{uid:lt.uid,name:lt.name,matricule:lt.matricule},decision:'rejected',rejectReason:b.rej};
      }
      const pieces={};if(b.pc)Object.entries(b.pc).forEach(([k,v])=>{if(v)pieces[k]=true;});
      await rtdb.ref('interventions/'+b.n).set({
        numBon:b.n,status:b.st,createdAt:now,updatedAt:decAt||subAt||now,
        tool:{refOutil:tool.refOutil,outilId:tool.outilId,fabricant:tool.fabricant,refFabricant:tool.refFabricant,
              pieces:{pAr:tool.pAr,pAv:tool.pAv,eAr:tool.eAr,eAv:tool.eAv},frequenceCycle:tool.frequenceCycle,toolId:tool.id},
        crimping:{filledAt:now,filledBy:{uid:tech.uid,name:tech.name,matricule:tech.matricule},
                  date:now,cycles:b.cycles,type:b.type,piecesChanged:pieces,observation:b.obs||'',cyclesPhotoUrl:null,signatureUrl:null},
        lab:labData,
        sla:{submittedAt:subAt,decidedAt:decAt,durationMs:subAt&&decAt?decAt-subAt:null},
        locked:b.st==='validated',statusHistory:hist,
        _indexes:{yearMonth:new Date(now).toISOString().slice(0,7),toolId:tool.id,status:b.st}
      });
      const icon={validated:'OK',submitted:'...',rejected:'X',draft:'~'}[b.st]||'?';
      log('  ['+icon+'] Bon N'+b.n+' - '+tool.outilId+' - '+b.st,'s');
      tick();await new Promise(r=>setTimeout(r,45));
    }
    progress(100);
    log('TERMINE : 20 outils - 14 valides - 7 attente - 5 refuses - 4 brouillons','w');
    const doneEl=document.getElementById('done-box');
    doneEl.classList.add('v');
    doneEl.innerHTML='<strong>Donnees injectees avec succes !</strong>'
      +'<b>20 outils</b> : WEZAG, MECAL, APLITEC, KOMAX, SCHLEUNIGER, CRIMPING CO<br/>'
      +'<b>30 bons</b> : 14 valides (avec Cm/Cmk) | 7 en attente labo | 5 refuses (avec motifs) | 4 brouillons<br/><br/>'
      +'<a href="admin-dashboard.html" style="color:#6ee7b7;font-weight:600;margin-right:1rem">Admin</a>'
      +'<a href="labo-dashboard.html"  style="color:#a5b4fc;font-weight:600;margin-right:1rem">Labo</a>'
      +'<a href="crimp-dashboard.html" style="color:#6ee7b7;font-weight:600">Crimp</a><br/><br/>'
      +'<span style="color:#f59e0b;font-size:.78rem">Supprime cette page apres utilisation.</span>';
    btn.textContent='Termine';
  }catch(err){
    log('ERREUR : '+err.message,'e');
    btn.disabled=false;btn.textContent='Reessayer';
  }
});

document.getElementById('btn-reset').addEventListener('click', async () => {
  if(!confirm('Effacer outils + interventions + compteurs ?'))return;
  const btn=document.getElementById('btn-reset');
  btn.disabled=true;btn.textContent='Effacement...';
  try{
    await rtdb.ref('tools').remove();
    await rtdb.ref('interventions').remove();
    await rtdb.ref('counters').remove();
    log('Donnees effacees. Pret pour le seed.','s');
    btn.textContent='Efface';btn.disabled=false;
  }catch(e){log('Erreur: '+e.message,'e');btn.disabled=false;btn.textContent='Reessayer';}
});
</script>
