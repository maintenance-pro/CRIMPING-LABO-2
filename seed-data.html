    .progress-wrap.v{display:block}

const logEl = document.getElementById('log');
function log(msg, type='i') {
  logEl.classList.add('v');
  const d=document.createElement('div'); d.className='l '+type;
  d.textContent='['+new Date().toLocaleTimeString('fr-FR')+']  '+msg;
  logEl.appendChild(d); logEl.scrollTop=logEl.scrollHeight;
  console.log('[SEED]',msg);
}
function progress(pct) {
  document.getElementById('pw').classList.add('v');
  document.getElementById('pb').style.width=pct+'%';
}

/* ═══════════════════════════════════════════════════════
   SEED PRINCIPAL
═══════════════════════════════════════════════════════ */
document.getElementById('btn-seed').addEventListener('click', async () => {
  const btn=document.getElementById('btn-seed');
  btn.disabled=true; btn.textContent='Injection en cours…';
  log('═══ DÉBUT SEED LEONI ═══','w');

  // Vérifier connexion admin
  const user = auth.currentUser;
  if (!user) {
    log('⚠ Aucune session — connexion auto avec admin@leoni.com…','w');
    try {
      // Essayer de se connecter silencieusement — le user doit déjà être connecté
      // via la page admin. Sinon on continue quand même car les règles RTDB
      // permettent l'écriture auth != null pour interventions/tools/counters
    } catch(e) {}
  }

  let total = TOOLS.length + INTERVENTIONS_DATA.length + EXTRA_USERS.length + 1;
  let done = 0;
  const tick = () => { done++; progress(Math.round(done/total*100)); };

  try {
    // ── 1. OUTILS ──────────────────────────────────────────────────
    log('Injection des outils ('+TOOLS.length+')…','i');
    for (const tool of TOOLS) {
      const t = { ...tool, createdAt: Date.now(), updatedAt: Date.now() };
      await rtdb.ref('tools/'+tool.id).set(t);
      log('  ✔ Outil '+tool.outilId+' ('+tool.fabricant+')','s');
      tick();
      await wait(80);
    }

    // ── 2. COMPTEUR ────────────────────────────────────────────────
    await rtdb.ref('counters/registre').set(INTERVENTIONS_DATA.length);
    log('Compteur registre → '+INTERVENTIONS_DATA.length,'s');
    tick();

    // ── 3. INTERVENTIONS ───────────────────────────────────────────
    log('Injection des bons d\'intervention ('+INTERVENTIONS_DATA.length+')…','i');
    for (const iv of INTERVENTIONS_DATA) {
      const tool   = TOOLS.find(t => t.id === iv.toolId) || TOOLS[0];
      const tech   = TECHNICIENS[iv.tech];
      const now    = makeDate(iv.daysAgo);
      const subAt  = iv.status !== 'draft' ? now + 3600000 : null;
      const decAt  = ['validated','rejected'].includes(iv.status) ? subAt + 7200000 : null;

      const bon = {
        numBon: iv.n,
        status: iv.status,
        createdAt: now, updatedAt: decAt || subAt || now,
        tool: {
          refOutil: tool.refOutil, outilId: tool.outilId,
          fabricant: tool.fabricant, refFabricant: tool.refFabricant,
          pieces: { pAr:tool.pAr, pAv:tool.pAv, eAr:tool.eAr, eAv:tool.eAv },
          frequenceCycle: tool.frequenceCycle, toolId: tool.id
        },
        crimping: {
          filledAt: now,
          filledBy: { uid:tech.uid, name:tech.name, matricule:tech.matricule },
          date: now, cycles: iv.cycles, type: iv.type,
          piecesChanged: iv.piecesChanged || {},
          observation: iv.obs,
          cyclesPhotoUrl: null, signatureUrl: null
        },
        lab: ['validated','rejected'].includes(iv.status) ? {
          filledAt: decAt,
          filledBy: { uid:LABO_TECH.uid, name:LABO_TECH.name, matricule:LABO_TECH.matricule },
          decision: iv.status,
          rejectReason: iv.rejectReason || null,
          refConnexion: LAB_TEMPLATE.refConnexion,
          sectionCable: LAB_TEMPLATE.sectionCable,
          indiceParametrique: LAB_TEMPLATE.indiceParametrique,
          largeurAme: LAB_TEMPLATE.largeurAme,
          largeurIsolant: LAB_TEMPLATE.largeurIsolant,
          measures: LAB_TEMPLATE.measures,
          conformites: iv.status==='validated' ? LAB_TEMPLATE.conformites : {chanfrein:false,temoinCoupe:true,flexion:false},
          chuteTension: LAB_TEMPLATE.chuteTension,
          signatureUrl: null
        } : null,
        sla: {
          submittedAt: subAt,
          decidedAt: decAt,
          durationMs: subAt && decAt ? decAt - subAt : null
        },
        locked: iv.status === 'validated',
        statusHistory: buildHistory(iv.status, now, subAt, decAt, tech, LABO_TECH),
        _indexes: {
          yearMonth: new Date(now).toISOString().slice(0,7),
          toolId: tool.id, status: iv.status
        }
      };

      await rtdb.ref('interventions/'+iv.n).set(bon);
      log('  ✔ Bon N°'+iv.n+' — '+tool.outilId+' — '+iv.status,'s');
      tick();
      await wait(60);
    }

    // ── 4. UTILISATEURS SUPPLÉMENTAIRES ───────────────────────────
    log('Injection des utilisateurs ('+EXTRA_USERS.length+')…','i');
    for (const u of EXTRA_USERS) {
      await rtdb.ref('users/'+u.uid).set({ ...u, lastLoginAt: null });
      log('  ✔ Utilisateur '+u.displayName+' ('+u.role+')','s');
      tick();
      await wait(80);
    }

    log('═══ SEED TERMINÉ ✅ ═══','w');
    progress(100);

    const r=document.getElementById('result');
    r.className='result ok';
    r.innerHTML=`<strong>✅ Données injectées avec succès !</strong>
      12 outils · 25 bons d'intervention · 3 utilisateurs<br/>
      <span style="font-size:.85rem;opacity:.8">Rechargez votre admin dashboard pour voir les données.</span><br/><br/>
      <a href="admin-dashboard.html" style="color:#6ee7b7;font-weight:600">→ Aller au dashboard Admin</a>`;
    btn.textContent='✅ Terminé';

  } catch(err) {
    log('ERREUR : '+err.message,'e');
    const r=document.getElementById('result');
    r.className='result err';
    r.innerHTML='<strong>❌ Erreur</strong>'+err.message+'<br/><small>Vérifiez que vous êtes connecté en tant qu\'admin et que les règles RTDB sont correctes.</small>';
    btn.disabled=false; btn.textContent='🔄 Réessayer';
  }
});

/* ── Reset ── */
document.getElementById('btn-reset').addEventListener('click', async () => {
  if (!confirm('Effacer tools + interventions + counters ? (Users conservés)')) return;
  const btn=document.getElementById('btn-reset');
  btn.disabled=true; btn.textContent='Effacement…';
  try {
    await rtdb.ref('tools').remove();
    await rtdb.ref('interventions').remove();
    await rtdb.ref('counters').remove();
    log('✔ tools, interventions, counters effacés.','s');
    btn.textContent='✅ Effacé';
  } catch(e) { log('Erreur: '+e.message,'e'); btn.disabled=false; btn.textContent='🗑 Réessayer'; }
});

/* ── Helpers ── */
function wait(ms){ return new Promise(r=>setTimeout(r,ms)); }

function buildHistory(status, now, subAt, decAt, tech, labo) {
  const h = [{ status:'draft', at:now, by:tech.uid, byName:tech.name }];
  if (['submitted','validated','rejected'].includes(status))
    h.push({ status:'submitted', at:subAt, by:tech.uid, byName:tech.name });
  if (status==='validated')
    h.push({ status:'validated', at:decAt, by:labo.uid, byName:labo.name });
  if (status==='rejected')
    h.push({ status:'rejected', at:decAt, by:labo.uid, byName:labo.name });
  return h;
}
</script>
