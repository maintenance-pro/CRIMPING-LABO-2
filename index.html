<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="LEONI Wiring Systems — Plateforme Crimping & Laboratoire" />
  <meta name="theme-color" content="#0a0e1a" />
  <title>LEONI · Connexion</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />

  <style>
    /* ═══════════════════════════════════════════════════
       RESET & VARIABLES
    ═══════════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep      : #060b16;
      --bg-card      : #0f1929;
      --bg-input     : rgba(255,255,255,.05);
      --border       : rgba(255,255,255,.07);
      --border-focus : #f59e0b;
      --accent       : #f59e0b;
      --accent-hover : #fbbf24;
      --accent-glow  : rgba(245,158,11,.18);
      --text         : #f0f4ff;
      --text-2       : #8895b3;
      --text-3       : #4b5a7a;
      --success      : #10b981;
      --danger       : #ef4444;
      --font         : 'Inter', system-ui, sans-serif;
      --mono         : 'JetBrains Mono', monospace;
      --r-card       : 20px;
      --r-input      : 10px;
      --transition   : .22s cubic-bezier(.4,0,.2,1);
    }

    html, body { height: 100%; }

    body {
      font-family: var(--font);
      background: var(--bg-deep);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(245,158,11,.028) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,158,11,.028) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* Ambient glow */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 55% 45% at 8% 15%, rgba(245,158,11,.07) 0%, transparent 60%),
        radial-gradient(ellipse 45% 55% at 92% 85%, rgba(99,102,241,.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ═══════════════════════════════════════════════════
       PRELOADER
    ═══════════════════════════════════════════════════ */
    #preloader {
      position: fixed;
      inset: 0;
      background: var(--bg-deep);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      transition: opacity .4s;
    }
    #preloader.hidden { opacity: 0; pointer-events: none; }

    .pl-logo    { font-size: 1.8rem; font-weight: 800; color: var(--accent); letter-spacing: -1px; }
    .pl-spinner {
      width: 30px; height: 30px;
      border: 3px solid rgba(245,158,11,.15);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    .pl-text { font-size: .78rem; color: var(--text-3); letter-spacing: .08em; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ═══════════════════════════════════════════════════
       CARD WRAPPER
    ═══════════════════════════════════════════════════ */
    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      padding: 1.5rem;
      animation: fadeUp .45s var(--transition) both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-card);
      padding: 2.75rem 2.5rem 2.25rem;
      box-shadow: 0 32px 80px rgba(0,0,0,.55), 0 0 0 1px var(--border);
      position: relative;
      overflow: hidden;
    }

    /* Top amber accent line */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent 0%, var(--accent) 50%, transparent 100%);
    }

    /* ═══════════════════════════════════════════════════
       HEADER
    ═══════════════════════════════════════════════════ */
    .header {
      text-align: center;
      margin-bottom: 2.25rem;
    }

    .logo-wrap {
      display: inline-flex;
      align-items: center;
      gap: .65rem;
      margin-bottom: 1.2rem;
    }

    .logo-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--accent) 0%, #d97706 100%);
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.15rem;
      font-weight: 800;
      color: #000;
      box-shadow: 0 4px 18px rgba(245,158,11,.32);
      flex-shrink: 0;
    }

    .logo-name {
      font-size: 1.55rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -1px;
    }

    .app-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: .3rem;
    }

    .app-sub {
      font-size: .8rem;
      color: var(--text-2);
    }

    /* Role pills row */
    .roles {
      display: flex;
      justify-content: center;
      gap: .45rem;
      margin-top: 1rem;
    }
    .pill {
      font-size: .68rem;
      font-weight: 600;
      letter-spacing: .05em;
      text-transform: uppercase;
      padding: .22rem .62rem;
      border-radius: 20px;
      border: 1px solid;
    }
    .pill--admin { color: #fca5a5; border-color: rgba(239,68,68,.35);  background: rgba(239,68,68,.08);  }
    .pill--labo  { color: #a5b4fc; border-color: rgba(99,102,241,.35); background: rgba(99,102,241,.08); }
    .pill--crimp { color: #6ee7b7; border-color: rgba(16,185,129,.35); background: rgba(16,185,129,.08); }

    /* ═══════════════════════════════════════════════════
       FIELDS
    ═══════════════════════════════════════════════════ */
    .field { margin-bottom: 1.2rem; }

    .field-label {
      display: block;
      font-size: .75rem;
      font-weight: 600;
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: .45rem;
    }

    .field-wrap { position: relative; }

    .field-input {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--r-input);
      padding: .8rem 1rem;
      font-size: .93rem;
      font-family: var(--font);
      color: var(--text);
      transition: border-color var(--transition), box-shadow var(--transition);
      -webkit-appearance: none;
    }
    .field-input::placeholder { color: var(--text-3); }
    .field-input:focus {
      outline: none;
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .field-input--pw { padding-right: 3rem; }

    .btn-eye {
      position: absolute;
      right: .75rem; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      cursor: pointer;
      color: var(--text-3);
      font-size: 1rem;
      padding: .2rem;
      line-height: 1;
      transition: color var(--transition);
    }
    .btn-eye:hover { color: var(--text); }

    /* ═══════════════════════════════════════════════════
       REMEMBER / FORGOT ROW
    ═══════════════════════════════════════════════════ */
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      font-size: .82rem;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: .45rem;
      cursor: pointer;
      color: var(--text-2);
      user-select: none;
    }
    .remember input[type="checkbox"] {
      width: 14px; height: 14px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .forgot {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      transition: color var(--transition);
    }
    .forgot:hover { color: var(--accent-hover); text-decoration: underline; }

    /* ═══════════════════════════════════════════════════
       SUBMIT BUTTON
    ═══════════════════════════════════════════════════ */
    .btn-submit {
      width: 100%;
      padding: .9rem;
      background: linear-gradient(135deg, var(--accent) 0%, #d97706 100%);
      color: #000;
      font-size: .95rem;
      font-weight: 700;
      font-family: var(--font);
      border: none;
      border-radius: var(--r-input);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .6rem;
      transition: all var(--transition);
      box-shadow: 0 4px 20px rgba(245,158,11,.25);
      letter-spacing: .02em;
    }
    .btn-submit:hover:not(:disabled) {
      background: linear-gradient(135deg, var(--accent-hover) 0%, var(--accent) 100%);
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(245,158,11,.38);
    }
    .btn-submit:active:not(:disabled) { transform: translateY(0); }
    .btn-submit:disabled { opacity: .5; cursor: not-allowed; transform: none; box-shadow: none; }

    .spinner {
      width: 16px; height: 16px;
      border: 2.5px solid rgba(0,0,0,.25);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }
    .btn-submit.loading .spinner  { display: block; }
    .btn-submit.loading .btn-text { display: none; }

    /* ═══════════════════════════════════════════════════
       ERROR & INFO BANNERS
    ═══════════════════════════════════════════════════ */
    .banner {
      display: none;
      margin-top: 1rem;
      padding: .8rem 1rem;
      border-radius: var(--r-input);
      font-size: .84rem;
      line-height: 1.5;
      animation: shake .3s ease;
    }
    .banner.visible  { display: flex; align-items: center; gap: .55rem; }
    .banner--error   { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3); color: #fca5a5; }
    .banner--success { background: rgba(16,185,129,.1); border: 1px solid rgba(16,185,129,.3); color: #6ee7b7; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-5px); }
      75%      { transform: translateX(5px); }
    }

    /* ═══════════════════════════════════════════════════
       FOOTER
    ═══════════════════════════════════════════════════ */
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 2rem;
      padding-top: 1.2rem;
      border-top: 1px solid var(--border);
      font-size: .73rem;
      color: var(--text-3);
    }
    .footer-ver {
      font-family: var(--mono);
      background: rgba(255,255,255,.04);
      padding: .18rem .5rem;
      border-radius: 5px;
    }

    /* ═══════════════════════════════════════════════════
       RESPONSIVE
    ═══════════════════════════════════════════════════ */
    @media (max-width: 480px) {
      .card { padding: 2rem 1.5rem 1.75rem; }
    }
  </style>
</head>
<body>

  <!-- PRELOADER -->
  <div id="preloader">
    <div class="pl-logo">LEONI</div>
    <div class="pl-spinner"></div>
    <div class="pl-text">Vérification de la session…</div>
  </div>

  <!-- LOGIN CARD -->
  <div class="wrapper" id="wrapper" style="display:none;">
    <div class="card">

      <header class="header">
        <div class="logo-wrap">
          <div class="logo-icon">L</div>
          <span class="logo-name">LEONI</span>
        </div>
        <div class="app-title">Crimping · Laboratoire</div>
        <div class="app-sub">Plateforme de gestion maintenance</div>
        <div class="roles">
          <span class="pill pill--admin">Admin</span>
          <span class="pill pill--labo">Labo</span>
          <span class="pill pill--crimp">Crimp</span>
        </div>
      </header>

      <form id="form-login" novalidate autocomplete="on">

        <!-- Email -->
        <div class="field">
          <label class="field-label" for="f-email">Adresse e-mail</label>
          <div class="field-wrap">
            <input class="field-input"
              id="f-email" name="email" type="email"
              inputmode="email" autocomplete="username"
              placeholder="exemple@leoni.com"
              spellcheck="false" autocapitalize="none" required />
          </div>
        </div>

        <!-- Mot de passe -->
        <div class="field">
          <label class="field-label" for="f-password">Mot de passe</label>
          <div class="field-wrap">
            <input class="field-input field-input--pw"
              id="f-password" name="password" type="password"
              autocomplete="current-password"
              placeholder="••••••••" required />
            <button class="btn-eye" type="button"
              id="btn-eye" aria-label="Afficher le mot de passe">👁</button>
          </div>
        </div>

        <!-- Remember + Forgot -->
        <div class="row">
          <label class="remember">
            <input type="checkbox" id="f-remember" name="remember" />
            <span>Se souvenir de moi</span>
          </label>
          <a class="forgot" href="#" id="link-forgot">Mot de passe oublié ?</a>
        </div>

        <!-- Submit -->
        <button class="btn-submit" type="submit" id="btn-submit">
          <div class="spinner"></div>
          <span class="btn-text">Se connecter</span>
        </button>

        <!-- Banners -->
        <div class="banner banner--error"   id="banner-error"   role="alert" aria-live="polite"></div>
        <div class="banner banner--success" id="banner-success" role="status"></div>

      </form>

      <footer class="footer">
        <span class="footer-ver">v2.0.0</span>
        <span>© 2025 LEONI Wiring Systems · Maintenance</span>
      </footer>

    </div>
  </div>


  <!-- ═══ Firebase SDK v9 compat ═══════════════════════════════════ -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <script>
  /* ═══════════════════════════════════════════════════════════════
     FIREBASE INIT
  ═══════════════════════════════════════════════════════════════ */
  firebase.initializeApp({
    apiKey:            "AIzaSyBIW4I1DRqyqcmNEdajXbptQ5-RWFIG1V4",
    authDomain:        "leoni-sertissage-labo.firebaseapp.com",
    databaseURL:       "https://leoni-sertissage-labo-default-rtdb.europe-west1.firebasedatabase.app",
    projectId:         "leoni-sertissage-labo",
    storageBucket:     "leoni-sertissage-labo.firebasestorage.app",
    messagingSenderId: "432527114405",
    appId:             "1:432527114405:web:b141f6ae74f11b1cbb0d4c"
  });

  const auth = firebase.auth();
  const rtdb = firebase.database();

  /* ═══════════════════════════════════════════════════════════════
     CONSTANTES
  ═══════════════════════════════════════════════════════════════ */
  const ROUTES = {
    admin : 'admin-dashboard.html',
    labo  : 'labo-dashboard.html',
    crimp : 'crimp-dashboard.html'
  };

  const ROLE_LABELS = {
    admin : 'Administrateur',
    labo  : 'Technicien Laboratoire',
    crimp : 'Technicien Crimping'
  };

  const ERR = {
    'auth/invalid-email'          : 'Adresse e-mail invalide.',
    'auth/user-disabled'          : 'Compte désactivé. Contactez l\'administrateur.',
    'auth/user-not-found'         : 'Aucun compte trouvé pour cet e-mail.',
    'auth/wrong-password'         : 'Mot de passe incorrect.',
    'auth/invalid-credential'     : 'Identifiants invalides. Vérifiez votre e-mail et mot de passe.',
    'auth/too-many-requests'      : 'Trop de tentatives. Réessayez dans quelques minutes.',
    'auth/network-request-failed' : 'Erreur réseau. Vérifiez votre connexion internet.',
    'role/not-found'              : 'Profil introuvable. Contactez l\'administrateur.',
    'role/inactive'               : 'Compte inactif. Contactez l\'administrateur.',
    'role/unknown'                : 'Rôle non reconnu. Contactez l\'administrateur.'
  };

  /* ═══════════════════════════════════════════════════════════════
     UI HELPERS
  ═══════════════════════════════════════════════════════════════ */
  const $ = id => document.getElementById(id);

  function showError(msg) {
    const el = $('banner-error');
    el.innerHTML = '<span>⚠</span><span>' + msg + '</span>';
    el.classList.add('visible');
    $('banner-success').classList.remove('visible');
  }

  function showInfo(msg) {
    const el = $('banner-success');
    el.innerHTML = '<span>✅</span><span>' + msg + '</span>';
    el.classList.add('visible');
    $('banner-error').classList.remove('visible');
  }

  function clearBanners() {
    $('banner-error').classList.remove('visible');
    $('banner-success').classList.remove('visible');
  }

  function setLoading(on) {
    const btn = $('btn-submit');
    btn.disabled = on;
    btn.classList.toggle('loading', on);
  }

  function showCard() {
    $('preloader').classList.add('hidden');
    $('wrapper').style.display = 'block';
  }

  /* ═══════════════════════════════════════════════════════════════
     FETCH PROFIL — Realtime Database /users/{uid}
  ═══════════════════════════════════════════════════════════════ */
  async function getProfile(uid) {
    const snap = await rtdb.ref('users/' + uid).once('value');
    return snap.val();
  }

  /* ═══════════════════════════════════════════════════════════════
     CACHE + REDIRECT
  ═══════════════════════════════════════════════════════════════ */
  function cacheProfile(user, profile) {
    sessionStorage.setItem('leoniUser', JSON.stringify({
      uid         : user.uid,
      email       : user.email,
      displayName : profile.displayName || user.email,
      role        : profile.role,
      matricule   : profile.matricule  || null
    }));
  }

  function redirectByRole(role) {
    const route = ROUTES[role];
    if (!route) return false;
    showInfo('Bienvenue — Redirection vers ' + (ROLE_LABELS[role] || role) + '…');
    setTimeout(() => window.location.replace(route), 900);
    return true;
  }

  /* ═══════════════════════════════════════════════════════════════
     VÉRIFICATION SESSION AU CHARGEMENT
  ═══════════════════════════════════════════════════════════════ */
  auth.onAuthStateChanged(async user => {
    if (user) {
      try {
        const profile = await getProfile(user.uid);
        if (profile && profile.active !== false && ROUTES[profile.role]) {
          cacheProfile(user, profile);
          showCard();
          redirectByRole(profile.role);
          return;
        }
      } catch (_) {}
      // Profil invalide → déconnecter
      await auth.signOut();
    }
    showCard();
  });

  /* ═══════════════════════════════════════════════════════════════
     SOUMISSION FORMULAIRE
  ═══════════════════════════════════════════════════════════════ */
  $('form-login').addEventListener('submit', async e => {
    e.preventDefault();
    clearBanners();

    const email    = $('f-email').value.trim();
    const password = $('f-password').value;
    const remember = $('f-remember').checked;

    if (!email || !password) {
      showError('Veuillez remplir tous les champs.');
      return;
    }

    setLoading(true);

    try {
      /* 1 — Persistance */
      await auth.setPersistence(
        remember
          ? firebase.auth.Auth.Persistence.LOCAL
          : firebase.auth.Auth.Persistence.SESSION
      );

      /* 2 — Authentification Firebase */
      const cred    = await auth.signInWithEmailAndPassword(email, password);
      const user    = cred.user;

      /* 3 — Récupérer profil dans Realtime DB */
      const profile = await getProfile(user.uid);

      if (!profile) {
        await auth.signOut();
        showError(ERR['role/not-found']);
        setLoading(false);
        return;
      }

      if (profile.active === false) {
        await auth.signOut();
        showError(ERR['role/inactive']);
        setLoading(false);
        return;
      }

      if (!ROUTES[profile.role]) {
        await auth.signOut();
        showError(ERR['role/unknown']);
        setLoading(false);
        return;
      }

      /* 4 — lastLoginAt (non-bloquant) */
      rtdb.ref('users/' + user.uid + '/lastLoginAt').set(Date.now());

      /* 5 — Cache sessionStorage */
      cacheProfile(user, profile);

      console.log('[LEONI] ✔ Connexion réussie —', user.email, '| Rôle :', profile.role);

      /* 6 — Redirect */
      redirectByRole(profile.role);

    } catch (err) {
      console.error('[LEONI] ✖ Login error:', err.code, err.message);
      showError(ERR[err.code] || 'Erreur inattendue (' + err.code + ')');
      setLoading(false);
    }
  });

  /* ═══════════════════════════════════════════════════════════════
     TOGGLE MOT DE PASSE
  ═══════════════════════════════════════════════════════════════ */
  $('btn-eye').addEventListener('click', function () {
    const inp     = $('f-password');
    const visible = inp.type === 'text';
    inp.type      = visible ? 'password' : 'text';
    this.textContent = visible ? '👁' : '🙈';
    this.setAttribute('aria-label',
      visible ? 'Afficher le mot de passe' : 'Masquer le mot de passe');
  });

  /* ═══════════════════════════════════════════════════════════════
     MOT DE PASSE OUBLIÉ
  ═══════════════════════════════════════════════════════════════ */
  $('link-forgot').addEventListener('click', async e => {
    e.preventDefault();
    clearBanners();
    const email = $('f-email').value.trim();

    if (!email) {
      showError('Saisissez d\'abord votre e-mail, puis cliquez sur "Mot de passe oublié".');
      return;
    }

    try {
      await auth.sendPasswordResetEmail(email);
      showInfo('E-mail de réinitialisation envoyé à ' + email + '. Vérifiez votre boîte.');
      console.log('[LEONI] Password reset email sent to', email);
    } catch (err) {
      showError(ERR[err.code] || err.message);
    }
  });
  </script>

</body>
</html>
