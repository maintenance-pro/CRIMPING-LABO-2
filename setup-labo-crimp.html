<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LEONI · Créer Comptes Labo & Crimp</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:#060b16;color:#f1f5f9;font-family:'Segoe UI',system-ui,sans-serif;
      min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
    .card{background:#0f1929;border:1px solid rgba(255,255,255,.07);border-radius:16px;
      padding:2.5rem;width:100%;max-width:560px}
    .logo{font-size:1.5rem;font-weight:800;color:#f59e0b}
    .title{font-size:.875rem;color:#64748b;margin:.3rem 0 1.75rem}

    .account-block{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);
      border-radius:12px;padding:1.25rem;margin-bottom:1rem}
    .account-header{display:flex;align-items:center;gap:.75rem;margin-bottom:1rem}
    .role-tag{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;
      padding:.25rem .65rem;border-radius:20px;border:1px solid}
    .role-tag--labo{color:#a5b4fc;border-color:rgba(99,102,241,.3);background:rgba(99,102,241,.1)}
    .role-tag--crimp{color:#6ee7b7;border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.1)}
    .account-email{font-size:.95rem;font-weight:600;color:#f1f5f9}

    .field{margin-bottom:.75rem}
    label{display:block;font-size:.72rem;color:#64748b;font-weight:600;
      text-transform:uppercase;letter-spacing:.05em;margin-bottom:.35rem}
    input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);
      border-radius:8px;padding:.65rem .9rem;color:#f1f5f9;font-size:.9rem;
      font-family:monospace;transition:border-color .15s}
    input:focus{outline:none;border-color:#f59e0b}

    .status{display:flex;align-items:center;gap:.5rem;font-size:.82rem;margin-top:.6rem;
      min-height:22px}
    .status-icon{font-size:1rem}

    hr{border:none;border-top:1px solid rgba(255,255,255,.07);margin:1.5rem 0}

    .btn{width:100%;padding:.9rem;background:linear-gradient(135deg,#f59e0b,#d97706);
      color:#000;border:none;border-radius:10px;font-size:1rem;font-weight:700;
      cursor:pointer;transition:all .2s}
    .btn:hover:not(:disabled){filter:brightness(1.1);transform:translateY(-1px)}
    .btn:disabled{opacity:.45;cursor:not-allowed;transform:none}

    .log{background:#020508;border:1px solid rgba(255,255,255,.05);border-radius:10px;
      padding:1rem;font-family:monospace;font-size:.78rem;max-height:220px;
      overflow-y:auto;margin-top:1.25rem;display:none}
    .log.v{display:block}
    .l{padding:.15rem 0;line-height:1.6}
    .l.s{color:#10b981}.l.e{color:#ef4444}.l.i{color:#64748b}.l.w{color:#f59e0b}

    .done{display:none;margin-top:1.25rem;padding:1.25rem;border-radius:10px;
      text-align:center;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);
      color:#6ee7b7;font-size:.9rem;line-height:1.8}
    .done.v{display:block}
    .done strong{display:block;font-size:1rem;margin-bottom:.4rem}
  </style>
</head>
<body>
<div class="card">
  <div class="logo">LEONI</div>
  <div class="title">Création des comptes Labo &amp; Crimp — Firebase Auth + RTDB</div>

  <!-- LABO -->
  <div class="account-block">
    <div class="account-header">
      <span class="role-tag role-tag--labo">Labo</span>
      <span class="account-email">labo@leoni.com</span>
    </div>
    <div class="field">
      <label>Nom complet</label>
      <input type="text" id="labo-name" value="Technicien Laboratoire" />
    </div>
    <div class="field">
      <label>Matricule</label>
      <input type="text" id="labo-mat" value="LN-LABO-001" />
    </div>
    <div class="field">
      <label>Mot de passe</label>
      <input type="text" id="labo-pass" value="Leoni@Labo2025!" />
    </div>
    <div class="status" id="status-labo">
      <span class="status-icon">⬜</span>
      <span>En attente…</span>
    </div>
  </div>

  <!-- CRIMP -->
  <div class="account-block">
    <div class="account-header">
      <span class="role-tag role-tag--crimp">Crimp</span>
      <span class="account-email">crimp@leoni.com</span>
    </div>
    <div class="field">
      <label>Nom complet</label>
      <input type="text" id="crimp-name" value="Technicien Crimping" />
    </div>
    <div class="field">
      <label>Matricule</label>
      <input type="text" id="crimp-mat" value="LN-CRIMP-001" />
    </div>
    <div class="field">
      <label>Mot de passe</label>
      <input type="text" id="crimp-pass" value="Leoni@Crimp2025!" />
    </div>
    <div class="status" id="status-crimp">
      <span class="status-icon">⬜</span>
      <span>En attente…</span>
    </div>
  </div>

  <hr />
  <button class="btn" id="btn-create">⚡ Créer les 2 comptes</button>
  <div class="log" id="log"></div>
  <div class="done" id="done"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
  firebase.initializeApp({
    apiKey:            "AIzaSyBIW4I1DRqyqcmNEdajXbptQ5-RWFIG1V4",
    authDomain:        "leoni-sertissage-labo.firebaseapp.com",
    databaseURL:       "https://leoni-sertissage-labo-default-rtdb.europe-west1.firebasedatabase.app",
    projectId:         "leoni-sertissage-labo",
    storageBucket:     "leoni-sertissage-labo.firebasestorage.app",
    messagingSenderId: "432527114405",
    appId:             "1:432527114405:web:b141f6ae74f11b1cbb0d4c"
  });

  const auth = firebase.auth();
  const rtdb = firebase.database();
  const logEl = document.getElementById('log');

  function log(msg, type='i') {
    logEl.classList.add('v');
    const d = document.createElement('div');
    d.className = 'l ' + type;
    d.textContent = '[' + new Date().toLocaleTimeString('fr-FR') + ']  ' + msg;
    logEl.appendChild(d);
    logEl.scrollTop = logEl.scrollHeight;
    console.log('[LEONI Setup]', msg);
  }

  function setStatus(role, icon, msg) {
    const el = document.getElementById('status-' + role);
    el.innerHTML = '<span class="status-icon">' + icon + '</span><span>' + msg + '</span>';
  }

  async function createAccount(email, password, role, displayName, matricule) {
    log('Création ' + email + '…', 'i');
    setStatus(role, '⏳', 'Création en cours…');

    try {
      // 1. Firebase Auth
      const cred = await auth.createUserWithEmailAndPassword(email, password);
      const uid  = cred.user.uid;
      log('  ✔ Auth OK → UID: ' + uid, 's');

      // 2. Update displayName in Auth
      await cred.user.updateProfile({ displayName });

      // 3. RTDB profile avec le VRAI UID
      await rtdb.ref('users/' + uid).set({
        uid,
        email,
        displayName,
        matricule,
        role,
        active    : true,
        createdAt : Date.now(),
        lastLoginAt: null
      });
      log('  ✔ RTDB /users/' + uid + ' créé (rôle: ' + role + ')', 's');

      // 4. Déconnecter pour ne pas rester connecté comme labo/crimp
      await auth.signOut();
      log('  ✔ Session fermée', 'i');

      setStatus(role, '✅', 'Créé avec succès — ' + email);
      return { success: true, uid };

    } catch (err) {
      if (err.code === 'auth/email-already-in-use') {
        log('  ⚠ ' + email + ' existe déjà — vérification RTDB…', 'w');
        // Essayer de récupérer l'UID existant via Auth (impossible en client SDK)
        // → Informer l'utilisateur
        setStatus(role, '⚠️', 'Compte Auth existant — vérifiez la RTDB manuellement');
        log('  → Connectez-vous avec ' + email + ' pour voir son UID dans la console', 'w');
        return { success: true, skipped: true };
      }
      log('  ✖ ERREUR: ' + err.code + ' — ' + err.message, 'e');
      setStatus(role, '❌', 'Erreur: ' + err.message);
      return { success: false, error: err };
    }
  }

  document.getElementById('btn-create').addEventListener('click', async () => {
    const btn = document.getElementById('btn-create');
    btn.disabled = true;
    btn.textContent = 'Création en cours…';

    log('═══ DÉBUT SETUP LABO + CRIMP ═══', 'w');

    const laboName  = document.getElementById('labo-name').value.trim();
    const laboMat   = document.getElementById('labo-mat').value.trim();
    const laboPass  = document.getElementById('labo-pass').value.trim();
    const crimpName = document.getElementById('crimp-name').value.trim();
    const crimpMat  = document.getElementById('crimp-mat').value.trim();
    const crimpPass = document.getElementById('crimp-pass').value.trim();

    if (laboPass.length < 8 || crimpPass.length < 8) {
      alert('Les mots de passe doivent contenir au moins 8 caractères.');
      btn.disabled = false; btn.textContent = '⚡ Créer les 2 comptes';
      return;
    }

    const r1 = await createAccount('labo@leoni.com',  laboPass,  'labo',  laboName,  laboMat);
    await new Promise(r => setTimeout(r, 500));
    const r2 = await createAccount('crimp@leoni.com', crimpPass, 'crimp', crimpName, crimpMat);

    log('═══ SETUP TERMINÉ ═══', 'w');

    if (r1.success && r2.success) {
      const done = document.getElementById('done');
      done.classList.add('v');
      done.innerHTML = `
        <strong>✅ Les 2 comptes sont créés !</strong>
        <b>labo@leoni.com</b> — Mot de passe : <code style="background:rgba(255,255,255,.1);padding:.1rem .4rem;border-radius:4px">${laboPass}</code><br/>
        <b>crimp@leoni.com</b> — Mot de passe : <code style="background:rgba(255,255,255,.1);padding:.1rem .4rem;border-radius:4px">${crimpPass}</code><br/><br/>
        <a href="index.html" style="color:#6ee7b7;font-weight:600">→ Aller au login</a>
        &nbsp;&nbsp;
        <span style="color:#f59e0b;font-size:.8rem">⚠️ Supprime cette page après utilisation</span>
      `;
      btn.textContent = '✅ Terminé';
    } else {
      btn.disabled = false;
      btn.textContent = '🔄 Réessayer';
    }
  });
</script>
</body>
</html>
